<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="icons/icon.png" />
    <title>DevFlash</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background canvas for animated particles -->
    <canvas id="bg-canvas"></canvas>

    <!-- Top bar -->
    <header class="topbar">
      <div class="logo">⚡ DevFlash</div>
      <!-- <div class="difficulty-wrap">
        <span class="diff-label">Level</span>
        <button id="toggleDiff" class="diff-btn" data-level="beginner">
          <span class="diff-indicator"></span>
          <span id="diffText">Beginner</span>
        </button>
      </div> -->
    </header>

    <!-- Main content -->
    <main class="main">
      <!-- Greeting -->
      <div class="greeting-wrap fade-up" style="--delay: 0.05s">
        <p id="greeting" class="greeting"></p>
        <p id="date-display" class="date-display"></p>
      </div>

      <!-- Search bar -->
      <div class="search-wrap fade-up" style="--delay: 0.15s">
        <div class="search-bar">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            id="searchInput"
            placeholder="Search the web or type a URL"
            autocomplete="off"
          />
          <kbd class="search-hint">↵</kbd>
        </div>
      </div>

      <!-- Content card -->
      <div class="card-wrap fade-up" style="--delay: 0.28s">
        <div class="card" id="card">
          <!-- Card header -->
          <div class="card-header">
            <div class="type-badge" id="typeBadge">—</div>
            <div class="card-actions">
              <button class="icon-btn" id="nextBtn" title="Next">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Dynamic content area -->
          <div class="card-body" id="cardBody"></div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer fade-up" style="--delay: 0.4s">
      <span>Press <kbd>↵</kbd> in search to go · <kbd>→</kbd> next card</span>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
